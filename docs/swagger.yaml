basePath: /api/v1
definitions:
  models.Availability:
    properties:
      heroClass:
        type: string
      id:
        type: string
      localTimezone:
        type: string
      name:
        type: string
      slotsByDate:
        additionalProperties:
          additionalProperties:
            type: string
          type: object
        type: object
      slug:
        type: string
    type: object
  models.CreateAvailabilityRequest:
    properties:
      heroClass:
        type: string
      localTimezone:
        type: string
      name:
        type: string
      slotsByDate:
        additionalProperties:
          additionalProperties:
            type: string
          type: object
        type: object
    type: object
  models.CreateSessionRequest:
    properties:
      endTime:
        type: string
      name:
        type: string
      selectedDates:
        items:
          type: string
        type: array
      startTime:
        type: string
      timeZone:
        type: string
    required:
    - endTime
    - name
    - startTime
    - timeZone
    type: object
  models.Session:
    properties:
      endTime:
        type: string
      id:
        type: string
      name:
        type: string
      selectedDates:
        items:
          type: string
        type: array
      slug:
        type: string
      startTime:
        type: string
      timeZone:
        type: string
    type: object
  models.UpdateSessionRequest:
    properties:
      endTime:
        type: string
      startTime:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for managing scheduling sessions.
  title: Availability Scheduler API
  version: "1.0"
paths:
  /availabilitys:
    post:
      consumes:
      - application/json
      parameters:
      - description: Availability to create
        in: body
        name: availability
        required: true
        schema:
          $ref: '#/definitions/models.CreateAvailabilityRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Availability'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a availability
      tags:
      - availabilitys
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /sessions:
    post:
      consumes:
      - application/json
      parameters:
      - description: Session to create
        in: body
        name: session
        required: true
        schema:
          $ref: '#/definitions/models.CreateSessionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Session'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a session
      tags:
      - sessions
  /sessions/{id}:
    delete:
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a session
      tags:
      - sessions
    put:
      consumes:
      - application/json
      parameters:
      - description: Session ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: session
        required: true
        schema:
          $ref: '#/definitions/models.UpdateSessionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Session'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a session
      tags:
      - sessions
  /sessions/{slug}:
    get:
      parameters:
      - description: Session Slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Session'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a session by Slug
      tags:
      - sessions
swagger: "2.0"
